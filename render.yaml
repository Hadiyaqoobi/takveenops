services:
  - type: web
    name: takvenops-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://takvenops.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.0"
